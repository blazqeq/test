<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jajaj Flyver</title>
    <style>
        /* Grundlæggende styling */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #1e1e2f, #2d2d44);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Den flyvende container */
        .flyvende-billede {
            position: absolute;
            width: 200px;
            height: 200px;
            animation: flyv 10s linear infinite alternate;
        }

        .flyvende-billede img {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 3px solid #00d4ff;
        }

        /* Animationen der flyver rundt */
        @keyframes flyv {
            0% { top: 10%; left: 10%; }
            25% { top: 10%; left: 80%; }
            50% { top: 80%; left: 80%; }
            75% { top: 80%; left: 10%; }
            100% { top: 10%; left: 10%; }
        }

        /* Moderne tekstboks */
        .content {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
            z-index: 10;
        }

        h1 { margin: 0; font-size: 3rem; text-transform: uppercase; letter-spacing: 5px; }
    </style>
</head>
<body>

    <div class="flyvende-billede">
        <img src="billede.png" alt="Jajaj">
    </div>

    <div class="content">
        <h1>JAJAJ</h1>
        <p>Velkommen til det moderne jajaj-univers</p>
    </div>

</body>
</html>
