<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Cinematic Player</title>
    <style>
        body { 
            margin: 0; background: #020617; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: 'Inter', sans-serif;
        }

        /* Container med "Glow" effekt */
        .video-wrapper {
            position: relative;
            padding: 10px;
            background: linear-gradient(135deg, #4f46e5, #ec4899);
            border-radius: 24px;
            box-shadow: 0 0 50px rgba(79, 70, 229, 0.3);
            transition: transform 0.3s ease;
        }
        .video-wrapper:hover { transform: scale(1.02); }

        /* Selve video-rammen */
        iframe {
            border-radius: 18px;
            display: block;
        }

        /* Dekorativ tekst */
        .info {
            position: absolute; bottom: -50px; left: 0; width: 100%;
            text-align: center; color: #94a3b8; font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <iframe 
            width="800" height="450" 
            src="https://www.youtube.com/embed/QRNzvG2CiOw" 
            title="YouTube video player" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            allowfullscreen>
        </iframe>
        <div class="info"></div>
    </div>

</body>
</html>
