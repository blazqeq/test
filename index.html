<!DOCTYPE html>
<html lang="da">
<head>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e1f22; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 300px; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #5865F2; margin-bottom: 15px; }
        .login-btn { background: #5865F2; color: white; padding: 12px 25px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .login-btn:hover { background: #4752c4; }
        .logout-btn { background: #ed4245; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 20px; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card" id="app">
    <!-- Logget ud visning -->
    <div id="loggedOut">
        <h1>Velkommen</h1>
        <p>Log ind for at se din profil</p>
        <a class="login-btn" href="https://discord.com/oauth2/authorize?client_id=1506775876447113236&response_type=code&redirect_uri=https%3A%2F%2Fblazqeq.github.io%2Ftest%2F&scope=identify">Login med Discord</a>
    </div>

    <!-- Logget ind visning -->
    <div id="loggedIn" class="hidden">
        <img id="avatar" class="avatar" src="" alt="Avatar">
        <h2 id="username">Bruger</h2>
        <button class="logout-btn" onclick="logout()">Log ud</button>
    </div>
</div>

<script>
    function logout() {
        localStorage.clear();
        window.location.href = "https://blazqeq.github.io/test/";
    }
    
    // Her ville logikken til at parse URL'en og vise data ligge
    // Efter du har modtaget koden fra Discord
</script>
</body>
</html>
