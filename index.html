<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>MongoTV Hub</title>
    <style>
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Ny animation til lys-aura */
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 0, 0, 0.3); }
            50% { box-shadow: 0 0 40px rgba(255, 0, 0, 0.6); }
        }

        body {
            margin: 0;
            background: linear-gradient(-45deg, #0f0f0f, #1a0a0a, #0f0f0f, #161616);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            font-family: 'Inter', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-card {
            width: 90%;
            max-width: 850px;
            text-align: center;
            padding: 40px;
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            margin-bottom: 30px;
            border-radius: 16px;
            overflow: hidden;
            /* Her sker magien: vi tilføjer animationen direkte på wrapperen */
            animation: glow 3s infinite alternate;
            border: 2px solid rgba(255, 255, 255, 0.05);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .sub-btn {
            display: inline-block;
            background: linear-gradient(90deg, #ff0000, #b30000);
            color: white;
            padding: 14px 35px;
            text-decoration: none;
            font-weight: 700;
            border-radius: 50px;
            transition: all 0.4s ease;
            text-transform: uppercase;
        }

        .sub-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.6);
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>MongoTV Live</h1>
        
        <div class="video-wrapper">
            <iframe 
                src="https://www.youtube.com/embed/OT36AdluC-I?si=bygb7L17nkCNDSEo&autoplay=1&mute=1" 
                title="YouTube video"
                allow="autoplay; encrypted-media"
                allowfullscreen>
            </iframe>
        </div>

        <a href="https://www.youtube.com/@MongoTV" target="_blank" class="sub-btn">
            Subscribe nu
        </a>
    </div>

</body>
</html>
