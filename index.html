<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McBlocked</title>
    <link rel="icon" href="blocked.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            height: 100vh;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            overflow-x: hidden;
        }

        /* --- Knapper --- */
        .knap-container { display: flex; gap: 20px; z-index: 10; margin-top: 250px; }
        .knap {
            padding: 1rem 2rem;
            background: rgba(255, 255, 255, 0.05);
            color: #38bdf8;
            border: 2px solid #38bdf8;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        .knap:hover { background: #38bdf8; color: #0f172a; transform: scale(1.05); box-shadow: 0 0 25px #38bdf8; }

        /* --- Video ramme med Glowing (Glitch fjernet) --- */
        #video-container {
            display: none;
            width: 80%;
            max-width: 700px;
            margin-bottom: 50px;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid #38bdf8;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            animation: fadeIn 0.4s ease;
            transition: 0.3s;
        }

        #video-container:hover {
            box-shadow: 0 0 40px rgba(56, 189, 248, 0.8);
            border-color: white;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        video { width: 100%; display: block; }

        /* --- Animationer --- */
        .cirkel-bane { position: absolute; width: 300px; height: 300px; display: flex; justify-content: center; align-items: center; animation: rotateFull 12s linear infinite; pointer-events: none; }
        .flyvende-container { width: 120px; animation: counterRotate 12s linear infinite; }
        .flyvende-container img { 
            width: 100%; 
            border-radius: 20px; 
            border: 4px solid #38bdf8;
        }
        
        @keyframes rotateFull { from { transform: rotate(0deg) translateX(150px) rotate(0deg); } to { transform: rotate(360deg) translateX(150px) rotate(-360deg); } }
        @keyframes counterRotate { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
    </style>
</head>
<body>

    <div class="cirkel-bane">
        <div class="flyvende-container">
            <img src="billede.png" alt="Flyvende Jajaj">
        </div>
    </div>

    <div class="knap-container">
        <a href="https://discord.gg/8bpU9VMWhM" target="_blank" class="knap">JOIN DISCORD</a>
        <button id="trailer-btn" class="knap" onclick="toggleVideo()">SE TRAILER</button>
    </div>

    <div id="video-container">
        <video id="trailer-video" controls>
            <source src="mcblocked.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        function toggleVideo() {
            const container = document.getElementById('video-container');
            const video = document.getElementById('trailer-video');
            const btn = document.getElementById('trailer-btn');
            
            if (container.style.display === 'block') {
                container.style.display = 'none';
                video.pause();
                btn.innerText = "SE TRAILER";
            } else {
                container.style.display = 'block';
                btn.innerText = "SKJUL TRAILER";
            }
        }
    </script>
</body>
</html>
