<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McBlocked</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            height: 100vh;
            background: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Cirkulær bane */
        .cirkel-bane {
            position: absolute;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: rotateFull 10s linear infinite;
        }

        .flyvende-container {
            width: 120px;
            animation: counterRotate 10s linear infinite;
        }

        .flyvende-container img {
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.2);
        }

        @keyframes rotateFull {
            from { transform: rotate(0deg) translateX(200px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(200px) rotate(-360deg); }
        }

        @keyframes counterRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }

        /* Glowing knap styling */
        .discord-knap {
            padding: 1.2rem 2.5rem;
            background: transparent;
            color: #00d4ff;
            border: 2px solid #00d4ff;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 15px #00d4ff, inset 0 0 10px #00d4ff;
            transition: 0.3s;
            z-index: 10;
        }

        .discord-knap:hover {
            background: #00d4ff;
            color: #0f172a;
            box-shadow: 0 0 30px #00d4ff;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="cirkel-bane">
        <div class="flyvende-container">
            <img src="billede.png" alt="Flyvende Jajaj">
        </div>
    </div>

    <a href="https://discord.gg/8bpU9VMWhM" class="discord-knap">JOIN DISCORD</a>

</body>
</html>
