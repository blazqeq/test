<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McBlocked</title>
    <link rel="icon" href="blocked.png" type="image/png">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            height: 100vh;
            background: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            overflow-x: hidden;
        }

        .knap-container { display: flex; gap: 20px; z-index: 10; }

        .knap {
            padding: 1.2rem 2.5rem;
            background: transparent;
            color: #00d4ff;
            border: 2px solid #00d4ff;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 15px #00d4ff, inset 0 0 10px #00d4ff;
            transition: 0.3s;
        }

        .knap:hover { background: #00d4ff; color: #0f172a; box-shadow: 0 0 30px #00d4ff; }

        /* Videofelt (skjult som standard) */
        #video-container {
            display: none;
            width: 80%;
            max-width: 600px;
            margin-top: 20px;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #00d4ff;
            box-shadow: 0 0 20px #00d4ff;
        }

        video { width: 100%; display: block; }

        /* Animationer (uændret) */
        .cirkel-bane {
            position: absolute;
            width: 300px; height: 300px;
            display: flex; justify-content: center; align-items: center;
            animation: rotateFull 10s linear infinite; pointer-events: none;
        }
        .flyvende-container { width: 120px; animation: counterRotate 10s linear infinite; }
        .flyvende-container img { width: 100%; border-radius: 24px; }
        @keyframes rotateFull { from { transform: rotate(0deg) translateX(200px) rotate(0deg); } to { transform: rotate(360deg) translateX(200px) rotate(-360deg); } }
        @keyframes counterRotate { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
    </style>
</head>
<body>

    <div class="cirkel-bane">
        <div class="flyvende-container">
            <img src="billede.png" alt="Flyvende Jajaj">
        </div>
    </div>

    <div class="knap-container">
        <a href="https://discord.gg/8bpU9VMWhM" class="knap">JOIN DISCORD</a>
        <button class="knap" onclick="visVideo()">SE TRAILER</button>
    </div>

    <div id="video-container">
        <video controls>
            <source src="mcblocked.mp4" type="video/mp4">
            Din browser understøtter ikke video-tagget.
        </video>
    </div>

    <script>
        function visVideo() {
            const container = document.getElementById('video-container');
            container.style.display = 'block';
        }
    </script>

</body>
</html>
