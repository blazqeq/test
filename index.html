<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Overraskelse!</title>
    <style>
        body { background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        #btn-container { text-align: center; }

        .glow-btn {
            padding: 20px 40px; font-size: 24px; color: #ff0055; background: transparent;
            border: 2px solid #ff0055; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 10px #ff0055, inset 0 0 10px #ff0055;
            transition: 0.3s;
        }

        .glow-btn:hover { background: #ff0055; color: #fff; box-shadow: 0 0 40px #ff0055; }

        /* Skjult container til videoen */
        #video-container { display: none; width: 80%; max-width: 800px; aspect-ratio: 16/9; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="btn-container">
        <button class="glow-btn" onclick="startRickRoll()">Klik her for en gave!</button>
    </div>

    <div id="video-container">
        <!-- Vi tilføjer ?autoplay=1 for at starte videoen med det samme -->
        <iframe id="rick-video" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <script>
        function startRickRoll() {
            // Skjul knappen
            document.getElementById('btn-container').style.display = 'none';
            // Vis video-containeren
            document.getElementById('video-container').style.display = 'block';
            // Sæt kilden til videoen med autoplay
            document.getElementById('rick-video').src = "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1";
        }
    </script>

</body>
</html>
